services:
  app:
    build: .
    container_name: lzvr-short
    expose:
      - "3000"
    environment:
      PORT: "3000"
      REDIS_URL: "redis://redis:6379"
      DEVCYCLE_SERVER_SDK_KEY: "${DEVCYCLE_SERVER_SDK_KEY}"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nginx_default

  redis:
    image: redis:7-alpine
    volumes:
      - ./redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - nginx_default

networks:
  nginx_default:
    external: true
